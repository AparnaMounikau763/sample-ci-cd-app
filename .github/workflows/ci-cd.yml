name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run Tests
      run: pytest --junitxml=test-results.xml

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build-push:
    needs: build-test-scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to JFrog
      run: echo "${{ secrets.JFROG_PASSWORD }}" | docker login <YOUR_JFROG_URL> -u ${{ secrets.JFROG_USERNAME }} --password-stdin

    - name: Build Docker Image
      run: docker build -t flask-app:latest .

    - name: Tag Image
      run: docker tag flask-app:latest <JFROG_IMAGE_PATH>:latest

    - name: Push Image
      run: docker push <JFROG_IMAGE_PATH>:latest

  deploy-to-aks:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS credentials
      run: az aks get-credentials --resource-group <RG> --name <AKS_CLUSTER>

    - name: Deploy to AKS
      run: kubectl apply -f k8s-deployment.yaml
