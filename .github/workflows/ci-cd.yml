name: CI-CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # REQUIRED for SonarQube

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10.20"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run Tests with Coverage
      run: |
        PYTHONPATH=. pytest --cov=. --cov-report=xml

    # 🔍 SONARQUBE SCAN
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build-push:
    needs: build-test-scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to JFrog Artifactory
      run: |
        echo "${{ secrets.JFROG_PASSWORD }}" | docker login ${{ secrets.JFROG_URL }} \
        -u ${{ secrets.JFROG_USERNAME }} --password-stdin

    - name: Build Docker Image
      run: docker build -t flask-app:latest .

    - name: Tag Docker Image
      run: |
        docker tag flask-app:latest \
        ${{ secrets.JFROG_URL }}/docker-local/flask-app:latest

    - name: Push Docker Image to JFrog
      run: |
        docker push ${{ secrets.JFROG_URL }}/docker-local/flask-app:latest

  deploy-to-aks:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Get AKS Credentials
      run: |
        az aks get-credentials \
        --resource-group <RESOURCE_GROUP> \
        --name <AKS_CLUSTER>

    - name: Deploy to AKS
      run: kubectl apply -f k8s-deployment.yaml
